<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Fazenda Alabama — v7 mobile</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --panel: rgba(17, 24, 39, 0.88);
    --panel-solid: #1f2937;
    --border: rgba(255, 255, 255, 0.1);
    --border2: rgba(255, 255, 255, 0.18);
    --text: #e5e7eb;
    --muted: #6b7280;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --green: #34d399;
    --amber: #fbbf24;
    --red: #f87171;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;overscroll-behavior:none}

  .app{display:grid;grid-template-columns:64px 1fr 380px;grid-template-rows:1fr;height:100dvh;position:relative}

  .sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:8px;z-index:500}
  .logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;margin-bottom:8px}
  .nav-btn{width:44px;height:44px;border:none;background:transparent;color:var(--muted);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit;padding:0}
  .nav-btn:active{background:var(--border)}
  .nav-btn.active{background:rgba(56,189,248,.15);color:var(--accent)}
  .nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .nav-btn-label{display:none}

  .map-area{position:relative;background:#1a1f2e;overflow:hidden}
  #map{width:100%;height:100%;background:#0f172a;position:relative;z-index:1}
  .leaflet-container{background:#0f172a;font-family:'Inter',sans-serif}

  /* Canvas overlay para vento — POSICIONAMENTO CORRIGIDO */
  #vento-canvas{
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    width:100%;height:100%;
    pointer-events:none;
    z-index:450;
    display:none;
  }

  .top-controls{position:absolute;top:12px;left:12px;right:12px;display:flex;flex-direction:column;gap:8px;z-index:500;pointer-events:none}
  .top-row{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
  .top-controls > *, .top-row > *{pointer-events:auto}

  .fazenda-title{background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;min-height:40px}
  .fazenda-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;flex-shrink:0}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .fazenda-title strong{font-size:13px;font-weight:600}
  .fazenda-title .sub{font-size:11px;color:var(--muted);margin-left:4px}

  .layers-control{background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:6px;display:flex;gap:2px;flex-wrap:wrap}
  .layer-btn{padding:8px 12px;font-size:12px;font-weight:500;color:var(--muted);background:transparent;border:1px solid transparent;border-radius:8px;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;min-height:36px;display:flex;align-items:center;gap:5px}
  .layer-btn:active{background:var(--border)}
  .layer-btn.active{color:var(--text);background:var(--border);border-color:var(--border2)}
  .layer-btn .icon{display:inline-block;width:8px;height:8px;border-radius:2px;flex-shrink:0}

  .variable-selector{background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:6px;display:flex;gap:2px;align-self:flex-start;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .var-btn{padding:7px 12px;font-size:12px;font-weight:500;color:var(--muted);background:transparent;border:none;border-radius:8px;cursor:pointer;font-family:inherit;white-space:nowrap;min-height:34px;display:flex;align-items:center;gap:5px}
  .var-btn:active{background:var(--border)}
  .var-btn.active{color:#0a0e1a;background:var(--accent)}

  .zoom-ctrl{position:absolute;right:12px;top:120px;display:flex;flex-direction:column;gap:1px;z-index:500}
  .zoom-ctrl button{width:38px;height:38px;background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);color:var(--text);font-size:18px;font-weight:600;cursor:pointer;font-family:inherit;line-height:1;display:flex;align-items:center;justify-content:center;padding:0}
  .zoom-ctrl button:first-child{border-radius:10px 10px 0 0}
  .zoom-ctrl button:last-child{border-radius:0 0 10px 10px;border-top:none}
  .zoom-ctrl button:active{background:var(--border)}

  .map-type{position:absolute;right:12px;top:212px;background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;z-index:500;overflow:hidden;min-width:60px}
  .map-type button{padding:9px 10px;font-size:10px;font-weight:600;color:var(--muted);background:transparent;border:none;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:.05em;min-height:34px}
  .map-type button:active{background:var(--border)}
  .map-type button.active{background:var(--border);color:var(--text)}

  .legend{position:absolute;left:12px;bottom:160px;background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:10px 12px;z-index:500;font-size:11px;min-width:200px;max-width:280px}
  .legend-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
  .legend-scale{display:flex;align-items:center;gap:6px}
  .legend-gradient{flex:1;height:10px;border-radius:5px}
  .legend-min,.legend-max{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}

  .timeline{position:absolute;bottom:12px;left:12px;right:12px;background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:14px;padding:12px 14px;z-index:500}
  .timeline-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;flex-wrap:wrap}
  .timeline-label{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
  .timeline-time{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--accent)}
  .play-btn{width:34px;height:34px;border-radius:50%;background:var(--accent);border:none;color:#0a0e1a;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
  .play-btn:active{transform:scale(.95)}
  .play-btn svg{width:14px;height:14px}
  .period-pills{display:flex;gap:3px;background:var(--border);padding:3px;border-radius:8px;flex-wrap:wrap}
  .period-pill{padding:5px 10px;font-size:11px;font-weight:600;color:var(--muted);background:transparent;border:none;border-radius:6px;cursor:pointer;font-family:inherit;min-height:28px}
  .period-pill:active{background:var(--panel-solid)}
  .period-pill.active{background:var(--panel-solid);color:var(--text)}
  .slider-wrap{position:relative;height:32px}
  .slider-track{position:absolute;top:14px;left:0;right:0;height:4px;background:var(--border);border-radius:2px}
  .slider-progress{position:absolute;top:14px;left:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px}
  .slider-thumb{position:absolute;top:6px;width:20px;height:20px;background:#fff;border-radius:50%;box-shadow:0 0 0 4px rgba(56,189,248,.25);transform:translateX(-50%);pointer-events:none}
  input[type=range].slider-input{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:10;margin:0}

  .sub-controls{position:absolute;left:12px;top:108px;z-index:500;display:flex;flex-direction:column;gap:6px}
  .sub-ctrl-group{background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:10px;padding:6px;display:flex;gap:2px}
  .sub-ctrl-group .sub-label{font-size:10px;color:var(--muted);padding:4px 8px;align-self:center;font-weight:500}
  .sub-btn{padding:5px 9px;font-size:11px;font-weight:500;color:var(--muted);background:transparent;border:none;border-radius:6px;cursor:pointer;font-family:inherit;min-height:28px}
  .sub-btn:active{background:var(--border)}
  .sub-btn.active{background:var(--accent);color:#0a0e1a}

  .panel{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;position:relative}
  .panel-tabs{display:flex;padding:10px 12px 0;gap:2px;border-bottom:1px solid var(--border);flex-shrink:0}
  .panel-tab{padding:10px 6px;font-size:12px;font-weight:500;color:var(--muted);background:transparent;border:none;cursor:pointer;font-family:inherit;flex:1;text-align:center;border-bottom:2px solid transparent;margin-bottom:-1px;min-height:38px}
  .panel-tab:active{background:var(--border)}
  .panel-tab.active{color:var(--text);border-bottom-color:var(--accent)}
  .panel-content{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
  .panel-content::-webkit-scrollbar{width:6px}
  .panel-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .panel-section{margin-bottom:18px}
  .panel-section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .stat-card{background:var(--panel-solid);border-radius:10px;padding:11px;border:1px solid var(--border)}
  .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:500;margin-bottom:4px}
  .stat-value{font-size:20px;font-weight:700;line-height:1.1}
  .stat-value .unit{font-size:11px;font-weight:400;color:var(--muted);margin-left:2px}
  .stat-card.wide{grid-column:span 2}
  .stat-trend{font-size:10px;margin-top:3px}
  .stat-trend.up{color:var(--red)}
  .stat-trend.down{color:var(--accent)}
  .stat-trend.neutral{color:var(--muted)}

  .station-list{display:flex;flex-direction:column;gap:5px}
  .station-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--panel-solid);border-radius:10px;cursor:pointer;border:1px solid transparent;transition:background .15s;min-height:54px}
  .station-item:active{background:var(--border)}
  .station-item.selected{border-color:var(--accent);background:rgba(56,189,248,.08)}
  .station-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
  .station-info{flex:1;min-width:0}
  .station-name{font-size:13px;font-weight:600}
  .station-meta{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
  .station-temp{font-size:14px;font-weight:600;font-family:'JetBrains Mono',monospace}

  .mini-chart{height:80px;background:var(--panel-solid);border-radius:10px;padding:8px;position:relative}

  /* ═══════════════ MOBILE NOVO LAYOUT (v7) ═══════════════ */
  /* Estilo: ícones flutuantes + bottom sheets */
  @media (max-width: 900px) {
    /* App ocupa tela inteira, sem sidebar */
    .app{grid-template-columns:1fr;grid-template-rows:1fr;height:100dvh}
    .sidebar{display:none}
    .map-area{height:100dvh;width:100%}

    /* Esconde todos os controles do desktop no mobile */
    .top-controls{display:none}
    .legend{display:none}
    .map-type{display:none}
    .zoom-ctrl{display:none}
    .sub-controls{display:none}

    /* ═══ Mini-título compacto (canto superior esquerdo) ═══ */
    .mobile-title{
      position:absolute;top:max(12px, env(safe-area-inset-top, 12px));left:12px;z-index:500;
      background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid var(--border);border-radius:24px;
      padding:6px 12px 6px 8px;display:flex;align-items:center;gap:6px;
      box-shadow:0 2px 8px rgba(0,0,0,.25);
    }
    .mobile-title .fazenda-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;box-shadow:0 0 6px var(--green)}
    .mobile-title strong{font-size:11px;font-weight:600}
    .mobile-title .sub{font-size:9px;color:var(--muted)}

    /* ═══ Indicador modo SIM compacto ═══ */
    .sim-tag{
      display:flex;position:absolute;top:max(12px, env(safe-area-inset-top, 12px));right:12px;left:auto;transform:none;
      background:rgba(251,191,36,.18);border:1px solid var(--amber);color:var(--amber);
      padding:5px 8px;border-radius:12px;font-size:9px;font-weight:600;
      z-index:500;letter-spacing:.04em;
    }

    /* ═══ FABs (Floating Action Buttons) — botões circulares ═══ */
    .fab-container-left{
      position:absolute;left:12px;bottom:calc(96px + var(--safe-bottom));z-index:500;
      display:flex;flex-direction:column;gap:10px;
    }
    .fab-container-right{
      position:absolute;right:12px;bottom:calc(96px + var(--safe-bottom));z-index:500;
      display:flex;flex-direction:column;gap:10px;
    }

    .fab-mobile{
      width:44px;height:44px;border-radius:50%;
      background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid var(--border);color:var(--text);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:all .15s;
      box-shadow:0 4px 12px rgba(0,0,0,.3);
      padding:0;font-family:inherit;
    }
    .fab-mobile:active{transform:scale(.92);background:var(--border)}
    .fab-mobile.active{background:var(--accent);color:#0a0e1a;border-color:var(--accent)}
    .fab-mobile svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

    /* Badge indicando estado ativo no canto do FAB */
    .fab-mobile .fab-badge{
      position:absolute;top:-2px;right:-2px;
      min-width:16px;height:16px;padding:0 4px;border-radius:8px;
      background:var(--accent);color:#0a0e1a;
      font-size:9px;font-weight:700;
      display:flex;align-items:center;justify-content:center;
      border:2px solid var(--bg2);
    }

    /* ═══ Timeline mobile compacta ═══ */
    .timeline{
      position:absolute;bottom:calc(12px + var(--safe-bottom));left:12px;right:12px;
      padding:8px 12px;
      background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border-radius:14px;
    }
    .timeline-header{gap:8px;margin-bottom:6px;flex-wrap:nowrap;align-items:center}
    .timeline-header > div:first-child{flex-shrink:0}
    .timeline-label{font-size:9px}
    .timeline-time{font-size:10px}
    .play-btn{width:28px;height:28px}
    .play-btn svg{width:12px;height:12px}

    .period-pills{order:3;width:100%;justify-content:space-between;padding:2px;gap:1px}
    .period-pill{flex:1;text-align:center;padding:4px 2px;font-size:9px;min-height:24px}

    .slider-wrap{height:24px}
    .slider-track{top:11px}
    .slider-progress{top:11px}
    .slider-thumb{top:4px;width:16px;height:16px;box-shadow:0 0 0 3px rgba(56,189,248,.25)}

    /* ═══ Drawer do painel inferior ═══ */
    .panel{
      position:fixed;bottom:0;left:0;right:0;top:auto;
      height:75dvh;max-height:600px;
      border-left:none;border-top:1px solid var(--border);
      border-radius:18px 18px 0 0;z-index:700;
      transform:translateY(100%);
      transition:transform .3s cubic-bezier(.32,.72,0,1);
      box-shadow:0 -8px 32px rgba(0,0,0,.5);
      padding-bottom:var(--safe-bottom);
    }
    .panel.open{transform:translateY(0)}
    .panel-handle{display:flex;align-items:center;justify-content:center;height:28px;cursor:grab;flex-shrink:0;position:relative;touch-action:none}
    .panel-handle::before{content:'';width:44px;height:4px;background:var(--border2);border-radius:2px}
    .panel-handle::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0}
    .panel-close{position:absolute;top:8px;right:10px;width:30px;height:30px;border-radius:50%;background:var(--border);border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;font-family:inherit;line-height:1;padding:0}

    /* ═══ Bottom Sheets — menus que sobem do rodapé ═══ */
    .sheet-backdrop{
      position:fixed;inset:0;background:rgba(0,0,0,.5);
      z-index:800;opacity:0;pointer-events:none;
      transition:opacity .25s;
    }
    .sheet-backdrop.open{opacity:1;pointer-events:auto}

    .bottom-sheet{
      position:fixed;bottom:0;left:0;right:0;
      background:var(--bg2);
      border-radius:20px 20px 0 0;
      z-index:850;
      transform:translateY(100%);
      transition:transform .3s cubic-bezier(.32,.72,0,1);
      padding-bottom:var(--safe-bottom);
      max-height:80dvh;overflow-y:auto;
      box-shadow:0 -8px 32px rgba(0,0,0,.5);
    }
    .bottom-sheet.open{transform:translateY(0)}

    .sheet-handle{height:24px;display:flex;align-items:center;justify-content:center}
    .sheet-handle::before{content:'';width:44px;height:4px;background:var(--border2);border-radius:2px}

    .sheet-title{font-size:14px;font-weight:700;padding:0 20px 12px;color:var(--text)}

    .sheet-section{padding:8px 16px 12px}
    .sheet-section-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:0 4px 6px}

    .sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .sheet-grid.cols-1{grid-template-columns:1fr}

    .sheet-item{
      background:var(--panel-solid);border:1px solid var(--border);
      border-radius:12px;padding:14px 12px;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;gap:6px;
      transition:all .15s;font-family:inherit;color:var(--text);
      min-height:64px;
    }
    .sheet-item:active{background:var(--border)}
    .sheet-item.active{background:rgba(56,189,248,.15);border-color:var(--accent);color:var(--accent)}
    .sheet-item .item-icon{font-size:18px;line-height:1}
    .sheet-item .item-label{font-size:11px;font-weight:600;text-align:center}
    .sheet-item.list-style{flex-direction:row;justify-content:flex-start;text-align:left;padding:10px 14px;min-height:48px}
    .sheet-item.list-style .item-icon{font-size:16px;width:24px;text-align:center}
    .sheet-item.list-style .item-label{flex:1;text-align:left}
    .sheet-item.list-style .item-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .sheet-item.list-style.active .item-check{background:var(--accent);border-color:var(--accent)}
    .sheet-item.list-style.active .item-check::before{content:'✓';color:#0a0e1a;font-size:12px;font-weight:700}

    /* ═══ Modo tela cheia (esconde todos os controles) ═══ */
    body.fullscreen .mobile-title,
    body.fullscreen .sim-tag,
    body.fullscreen .fab-container-left,
    body.fullscreen .fab-container-right,
    body.fullscreen .timeline{
      opacity:0;pointer-events:none;transition:opacity .3s;
    }
    body.fullscreen .exit-fullscreen{
      display:flex;
    }
    .exit-fullscreen{
      display:none;
      position:absolute;top:max(12px, env(safe-area-inset-top, 12px));right:12px;
      width:40px;height:40px;border-radius:50%;
      background:var(--panel);backdrop-filter:blur(12px);
      border:1px solid var(--border);color:var(--text);
      align-items:center;justify-content:center;
      z-index:990;cursor:pointer;padding:0;
      box-shadow:0 4px 12px rgba(0,0,0,.3);
    }
    .exit-fullscreen svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}

    /* ═══ Tooltip de nome do lote (permanente) ═══ */
    .lote-name-label{
      background:rgba(0,0,0,.6);color:white;
      padding:1px 5px;border-radius:3px;
      font-size:9px;font-weight:600;
      pointer-events:none;
      text-shadow:0 1px 2px rgba(0,0,0,.8);
      border:none;box-shadow:none;
      white-space:nowrap;
    }
  }

  /* Em desktop, esconde elementos só-mobile */
  @media (min-width: 901px) {
    .mobile-title,
    .fab-container-left,
    .fab-container-right,
    .exit-fullscreen,
    .sheet-backdrop,
    .bottom-sheet{display:none !important}
  }

  @media (min-width: 901px) {
    .panel-handle{display:none}
    .panel-close{display:none !important}
    .mobile-title,
    .fab-container-left,
    .fab-container-right,
    .exit-fullscreen,
    .sheet-backdrop,
    .bottom-sheet{display:none !important}
  }

  .station-marker{background:transparent;border:none}
  .marker-circle{width:30px;height:30px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:'Inter';box-shadow:0 2px 8px rgba(0,0,0,.4)}
  .marker-torre{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#1e40af,#3b82f6);border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;box-shadow:0 4px 12px rgba(59,130,246,.5)}

  .leaflet-popup-content-wrapper{background:var(--panel-solid);color:var(--text);border-radius:12px;border:1px solid var(--border2)}
  .leaflet-popup-tip{background:var(--panel-solid)}
  .leaflet-popup-content{margin:14px 16px;font-family:'Inter',sans-serif;min-width:200px}
  .popup-title{font-weight:700;font-size:14px;margin-bottom:8px;color:var(--accent)}
  .popup-grid{display:grid;grid-template-columns:auto auto;gap:4px 12px;font-size:12px}
  .popup-key{color:var(--muted)}
  .popup-val{font-family:'JetBrains Mono',monospace;text-align:right}

  .sim-tag{position:absolute;bottom:auto;top:62px;left:50%;transform:translateX(-50%);background:rgba(251,191,36,.15);border:1px solid var(--amber);color:var(--amber);padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;letter-spacing:.05em;z-index:300;white-space:nowrap}
  @media (max-width: 900px) {.sim-tag{display:none}}

  .chart-svg{width:100%;height:100%}
  .chart-line{fill:none;stroke:var(--accent);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .chart-area{fill:url(#chart-grad)}

  .leaflet-control-attribution{background:rgba(15,23,42,.85)!important;color:var(--muted)!important;font-size:9px!important;padding:1px 5px!important}
  .leaflet-control-attribution a{color:var(--accent)!important}

  .lote-tooltip{background:rgba(15,23,42,.95)!important;border:1px solid var(--border2)!important;color:var(--text)!important;font-size:11px!important;padding:4px 8px!important;border-radius:6px!important;font-family:'Inter'!important}
</style>
</head>

<div class="app">
  <aside class="sidebar">
    <div class="logo">A</div>
    <button class="nav-btn active" data-nav="map" title="Mapa">
      <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>

    <button class="nav-btn" data-nav="stations" title="Estações">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span class="nav-btn-label">Estações</span>

    <button class="nav-btn" data-nav="lotes" title="Lotes">

    <canvas id="vento-canvas"></canvas>

    <!-- ═══════ MOBILE: Mini-título compacto ═══════ -->
    <div class="mobile-title">

    <!-- ═══════ MOBILE: FABs lado esquerdo ═══════ -->
    <div class="fab-container-left">
      <button class="fab-mobile" id="fab-camadas" aria-label="Camadas">
        <svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
      </button>
      <button class="fab-mobile" id="fab-variavel" aria-label="Variável">
        <svg viewBox="0 0 24 24"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
      </button>
      <button class="fab-mobile" id="fab-painel" aria-label="Painel de dados">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </button>
    </div>

    <!-- ═══════ MOBILE: FABs lado direito ═══════ -->
    <div class="fab-container-right">
      <button class="fab-mobile" id="fab-mapa" aria-label="Tipo de mapa">
        <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
      </button>
      <button class="fab-mobile" id="fab-config" aria-label="Configurações">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

      <button class="fab-mobile" id="fab-zoom-in" aria-label="Zoom +">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="fab-mobile" id="fab-zoom-out" aria-label="Zoom -">
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="fab-mobile" id="fab-gps" aria-label="Minha localização">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
      </button>
    </div>

    <div class="sheet-backdrop" id="sheet-backdrop"></div>

    <!-- ═══════ MOBILE: Bottom Sheet — Camadas ═══════ -->
    <div class="bottom-sheet" id="sheet-camadas">

      <div class="sheet-title">Camadas do mapa</div>
      <div class="sheet-section">
        <div class="sheet-grid cols-1" id="sheet-camadas-list"></div>
      </div>
    </div>

    <!-- ═══════ MOBILE: Bottom Sheet — Variável ═══════ -->
    <div class="bottom-sheet" id="sheet-variavel">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Variável principal</div>
      <div class="sheet-section">
        <div class="sheet-grid" id="sheet-variavel-list"></div>
      </div>
      <div class="sheet-section" id="sheet-heatmap-style-wrap" style="display:none">
        <div class="sheet-section-title">Estilo do heatmap</div>
        <div class="sheet-grid" id="sheet-heatmap-style-list"></div>
      </div>
    </div>

    <!-- ═══════ MOBILE: Bottom Sheet — Tipo de mapa ═══════ -->
    <div class="bottom-sheet" id="sheet-mapa">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Tipo de mapa</div>
      <div class="sheet-section">
        <div class="sheet-grid" id="sheet-mapa-list"></div>
      </div>
    </div>

    <!-- ═══════ MOBILE: Bottom Sheet — Configurações ═══════ -->
    <div class="bottom-sheet" id="sheet-config">

      <div class="sheet-title">Configurações</div>

            <span class="item-label">Modo tela cheia</span>
            <span class="item-check"></span>
          </button>

            <span class="item-icon">🌙</span>
            <span class="item-label">Tema escuro automático</span>
            <span class="item-check active"></span>
          </button>

            <span class="item-label">Vibração ao tocar</span>
            <span class="item-check active"></span>
          </button>
          <button class="sheet-item list-style" id="cfg-compass">
            <span class="item-icon">🧭</span>
            <span class="item-label">Orientar mapa para norte</span>
            <span class="item-check active"></span>
          </button>
        </div>
      </div>
    </div>


    <div class="top-controls">
      <div class="top-row">
        <div class="fazenda-title">
          <span class="fazenda-dot"></span>
          <strong>Fazenda Alabama</strong>
          <span class="sub" id="hdr-stats">20 estações</span>
        </div>
        <div class="layers-control" id="layers-control">
          <button class="layer-btn active" data-layer="lotes"><span class="icon" style="background:#34d399"></span>Lotes</button>
          <button class="layer-btn active" data-layer="estacoes"><span class="icon" style="background:#38bdf8"></span>Estações</button>
          <button class="layer-btn active" data-layer="heatmap"><span class="icon" style="background:linear-gradient(90deg,#3b82f6,#fbbf24,#ef4444)"></span>Heatmap</button>
          <button class="layer-btn" data-layer="vento"><span class="icon" style="background:#34d399"></span>Vento</button>
        </div>
      </div>
      <div class="variable-selector" id="variable-selector">
        <button class="var-btn active" data-var="temp">🌡️ Temperatura</button>
        <button class="var-btn" data-var="umid">💧 Umidade</button>
        <button class="var-btn" data-var="pres">📊 Pressão</button>
        <button class="var-btn" data-var="chuva">🌧️ Chuva acum.</button>
      </div>
    </div>

    <div class="sub-controls" id="sub-controls">
      <div class="sub-ctrl-group" id="heatmap-style-group">
        <span class="sub-label">Estilo:</span>
        <button class="sub-btn active" data-hm="interp">Interpolado</button>
        <button class="sub-btn" data-hm="lote">Por lote</button>
      </div>
      <div class="sub-ctrl-group" id="vento-style-group" style="display:none">
        <span class="sub-label">Vento:</span>
        <button class="sub-btn active" data-vs="part-rastro">Partículas c/ rastro</button>
        <button class="sub-btn" data-vs="part-puras">Partículas s/ rastro</button>
      </div>
    </div>

    <div class="zoom-ctrl">
      <button id="zoom-in">+</button>
      <button id="zoom-out">−</button>
    </div>

    <div class="map-type">
      <button class="active" data-tile="satellite">Sat</button>
      <button data-tile="hybrid">Híbrido</button>
      <button data-tile="terrain">Topo</button>
      <button data-tile="streets">Ruas</button>
    </div>

    <div class="legend">
      <div class="legend-title" id="legend-title">Temperatura (°C)</div>
      <div class="legend-scale">
        <span class="legend-min" id="legend-min">18</span>
        <div class="legend-gradient" id="legend-gradient"></div>
        <span class="legend-max" id="legend-max">34</span>
      </div>
    </div>

    <div class="timeline">
      <div class="timeline-header">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="play-btn" id="play-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
          <div>
            <div class="timeline-label" id="timeline-label">Média do período</div>
            <div class="timeline-time" id="timeline-time">--</div>
          </div>
        </div>
        <div class="period-pills">
          <button class="period-pill" data-period="live">Live</button>
          <button class="period-pill active" data-period="24h">24h</button>
          <button class="period-pill" data-period="7d">7 dias</button>
          <button class="period-pill" data-period="30d">30 dias</button>
          <button class="period-pill" data-period="safra">Safra</button>
        </div>
      </div>
      <div class="slider-wrap">
        <div class="slider-track"></div>
        <div class="slider-progress" id="slider-progress" style="width:75%"></div>
        <div class="slider-thumb" id="slider-thumb" style="left:75%"></div>
        <input type="range" class="slider-input" id="slider-input" min="0" max="100" value="75">
      </div>
    </div>
  </section>

  <aside class="panel" id="panel">
    <div class="panel-handle" id="panel-handle"></div>
    <button class="panel-close" id="panel-close">×</button>
    <div class="panel-tabs">
      <button class="panel-tab active" data-tab="overview">Geral</button>
      <button class="panel-tab" data-tab="stations">Estações</button>
      <button class="panel-tab" data-tab="lotes">Lotes</button>
      <button class="panel-tab" data-tab="analise">Análise</button>
    </div>
    <div class="panel-content" id="panel-content"></div>
  </aside>
</div>

//  roxo → azul → ciano → verde → amarelo → laranja → vermelho → vermelho escuro
// ════════════════════════════════════════════════
const GRAD_METEOR = [

const GRAD_CHUVA = [
  [241, 245, 249],  // quase branco
  [186, 230, 253],  // azul muito claro
  [125, 211, 252],  // azul claro

  [88, 28, 135],    // roxo

];

function getGradiente(variavel) {
  return variavel === 'chuva' ? GRAD_CHUVA : GRAD_METEOR;
}

function corPorValor(v, varName) {
  const ranges = {
    temp: [18, 34], umid: [20, 100], pres: [1005, 1025],
    chuva: [0, getMaxChuva()]
  };
  let [min, max] = ranges[varName];
  // umidade e pressão: invertem (mais alto = azul ao invés de vermelho)
  // Para soja faz sentido: alta umidade = "ruim" (doença), baixa = "ruim" (seca)
  // Vamos manter direção natural: mais alto = mais "quente" no gradiente
  let norm = Math.max(0, Math.min(1, (v - min) / (max - min)));
  if (varName === 'umid') norm = 1 - norm; // inverte umidade pra ficar intuitivo

  const grad = getGradiente(varName);
  const pos = norm * (grad.length - 1);
  const i0 = Math.floor(pos);
  const i1 = Math.min(grad.length - 1, i0 + 1);
  const t = pos - i0;
  return [
    Math.round(grad[i0][0]*(1-t) + grad[i1][0]*t),
    Math.round(grad[i0][1]*(1-t) + grad[i1][1]*t),
    Math.round(grad[i0][2]*(1-t) + grad[i1][2]*t)
  ];
}

function gradCSS(variavel) {
  const grad = getGradiente(variavel);
  let parts = grad.map((c,i) => `rgb(${c[0]},${c[1]},${c[2]}) ${(i/(grad.length-1))*100}%`);
  if (variavel === 'umid') parts = parts.reverse().map((p,i) => p.replace(/\s\d+(\.\d+)?%/, ` ${(i/(grad.length-1))*100}%`));
  return `linear-gradient(90deg, ${parts.join(',')})`;
}

    const chuva24h = Math.max(0, 5 + Math.sin(simPhase*0.3 + idx*0.5)*8 + latOff*3);
    const chuva7d = chuva24h * 3.5 + Math.sin(idx)*15 + 20;
    const chuva30d = chuva7d * 3.2 + 40;
    const chuvaSafra = chuva30d * 4 + 80;
    const solo = 45 + Math.sin(simPhase*0.3 + idx) * 15 + lonOff*5;
    const bateria = 12.4 + Math.sin(simPhase*0.1 + idx) * 0.3;
    const hops = (idx === 13 || idx === 14) ? 2 : (idx === 6 || idx === 10) ? 1 : 0;
    return {
      ...e,
      nome: `Estação ${String(e.id).padStart(2,'0')}`,
      temp:+temp.toFixed(1), umid:+Math.max(20,Math.min(100,umid)).toFixed(0),
      pres:+pres.toFixed(1), ventoVel:+ventoVel.toFixed(1),
      ventoDir:+ventoDir.toFixed(0),
      chuva24h:+chuva24h.toFixed(1), chuva7d:+chuva7d.toFixed(1),
      chuva30d:+chuva30d.toFixed(1), chuvaSafra:+chuvaSafra.toFixed(1),
      solo:+Math.max(0,Math.min(100,solo)).toFixed(0),
      bateria:+bateria.toFixed(2), hops, rssi:-70-Math.floor(Math.random()*40),
      online: idx !== 15 || Math.random() > 0.3
    };
  });
}

function createTile(primaryUrl, fallbackUrl, attr) {
  const layer = L.tileLayer(primaryUrl, { attribution: attr, maxZoom: 19 });

      map.removeLayer(layer);
      L.tileLayer(fallbackUrl, { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(map);
    }
  });
  return layer;
}

function bindTouch(el, handler) {
  let touched = false;
  el.addEventListener('touchstart', (e) => { touched = true; e.stopPropagation(); }, { passive: true });
  el.addEventListener('touchend', (e) => {

function centroideLote(coords) {
  let lat=0, lon=0;
  coords.forEach(c => { lat += c[0]; lon += c[1]; });
  return [lat/coords.length, lon/coords.length];
}
const loteCentroids = {};
LOTES.forEach(l => loteCentroids[l.nome] = centroideLote(l.coords));

function calcFazendaBBox() {
  let minLat=999, maxLat=-999, minLon=999, maxLon=-999;
  LOTES.forEach(l => l.coords.forEach(c => {
    if (c[0] < minLat) minLat = c[0];
    if (c[0] > maxLat) maxLat = c[0];
    if (c[1] < minLon) minLon = c[1];
    if (c[1] > maxLon) maxLon = c[1];
  }));
  return { minLat, maxLat, minLon, maxLon };
}
const fazendaBBox = calcFazendaBBox();

function pointInPoly(lat, lon, coords) {
  let inside = false;
  for (let i = 0, j = coords.length - 1; i < coords.length; j = i++) {
    const xi = coords[i][0], yi = coords[i][1];
    const xj = coords[j][0], yj = coords[j][1];
    const intersect = ((yi > lon) !== (yj > lon)) &&
      (lat < (xj - xi) * (lon - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

// Distância mínima de um ponto até a borda de um polígono (em graus)
function distToPolyEdge(lat, lon, coords) {
  let minDist = Infinity;
  for (let i = 0; i < coords.length - 1; i++) {
    const d = pointToSegmentDist(lat, lon, coords[i][0], coords[i][1], coords[i+1][0], coords[i+1][1]);
    if (d < minDist) minDist = d;
  }
  return minDist;
}

function pointToSegmentDist(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx*dx + dy*dy;
  let t = 0;
  if (lenSq > 0) t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  const cx = x1 + t * dx, cy = y1 + t * dy;
  return Math.sqrt((px-cx)**2 + (py-cy)**2);
}

function pontoNaFazenda(lat, lon) {
  for (const lote of LOTES) {
    if (pointInPoly(lat, lon, lote.coords)) return true;
  }
  return false;
}

// Retorna alpha baseado em proximidade da borda (antialias)
function alphaAntialias(lat, lon) {
  // Threshold em graus (~30m)
  const THRESH = 0.0003;
  let dentro = false;
  let minDistBorda = Infinity;
  for (const lote of LOTES) {
    if (pointInPoly(lat, lon, lote.coords)) {
      dentro = true;
      const d = distToPolyEdge(lat, lon, lote.coords);
      if (d < minDistBorda) minDistBorda = d;
    }
  }
  if (!dentro) {
    // Verifica se está MUITO próximo (fade externo)
    for (const lote of LOTES) {
      const d = distToPolyEdge(lat, lon, lote.coords);
      if (d < THRESH) {
        return Math.max(0, 1 - (d / THRESH)) * 0.5;
      }
    }
    return 0;
  }
  // Dentro: fade na borda interna
  if (minDistBorda < THRESH) {
    return 0.5 + (minDistBorda / THRESH) * 0.5;
  }
  return 1.0;
}

// ════════════════════════════════════════════════
//  HEATMAP — 280×280 + ANTIALIAS + OPACIDADE 0.85
// ════════════════════════════════════════════════
const heatmapLayer = L.layerGroup();

function renderizarHeatmap() {
  heatmapLayer.clearLayers();
  if (!camadas.heatmap) return;
  if (heatmapStyle === 'lote') renderHeatmapPorLote();
  else renderHeatmapInterpolado();
  heatmapLayer.addTo(map);
}

function renderHeatmapInterpolado() {
  const GRID = 280; // resolução dobrada
  const bb = fazendaBBox;
  const dLat = (bb.maxLat - bb.minLat) / GRID;
  const dLon = (bb.maxLon - bb.minLon) / GRID;
  const canvas = document.createElement('canvas');
  canvas.width = GRID;
  canvas.height = GRID;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(GRID, GRID);

  for (let i = 0; i < GRID; i++) {
    for (let j = 0; j < GRID; j++) {
      const lat = bb.maxLat - i * dLat;
      const lon = bb.minLon + j * dLon;
      const idx = (i * GRID + j) * 4;

      const alpha = alphaAntialias(lat, lon);
      if (alpha < 0.01) { imgData.data[idx+3] = 0; continue; }

      // IDW
      let num = 0, den = 0;
      for (const e of estacoes) {
        const d2 = (lat-e.lat)**2 + (lon-e.lon)**2;
        if (d2 < 1e-10) { num = getValor(e, varAtiva); den = 1; break; }
        const w = 1 / (d2 + 1e-8);
        num += w * getValor(e, varAtiva);
        den += w;
      }
      const v = num/den;
      const rgb = corPorValor(v, varAtiva);
      imgData.data[idx] = rgb[0];
      imgData.data[idx+1] = rgb[1];
      imgData.data[idx+2] = rgb[2];
      imgData.data[idx+3] = Math.round(255 * alpha);
    }
  }
  ctx.putImageData(imgData, 0, 0);
  const corners = [[bb.minLat, bb.minLon], [bb.maxLat, bb.maxLon]];
  // OPACIDADE 0.85
  heatmapLayer.addLayer(L.imageOverlay(canvas.toDataURL(), corners, { opacity: 0.85 }));
}

function renderHeatmapPorLote() {
  LOTES.forEach(lote => {
    const c = loteCentroids[lote.nome];
    const proximas = estacoes
      .map(e => ({...e, d: (e.lat-c[0])**2 + (e.lon-c[1])**2}))
      .sort((a,b) => a.d - b.d).slice(0, 3);
    const totalW = proximas.reduce((s, e) => s + 1/(e.d+1e-8), 0);
    const v = proximas.reduce((s, e) => s + getValor(e, varAtiva)/(e.d+1e-8), 0) / totalW;
    const cor = corHex(corPorValor(v, varAtiva));
    const poly = L.polygon(lote.coords, {
      color: cor, weight: 1.5, opacity: 0.9,
      fillColor: cor, fillOpacity: 0.85  // OPACIDADE 0.85
    });
    poly.bindTooltip(`<strong>${lote.nome}</strong><br>${labelVar(varAtiva)}: ${v.toFixed(1)}${unidVar(varAtiva)}`, { sticky: true, className: 'lote-tooltip' });
    heatmapLayer.addLayer(poly);
  });
}

function labelVar(v) {
  return { temp:'Temp', umid:'Umidade', pres:'Pressão', chuva:'Chuva' }[v];
}
function unidVar(v) {
  return { temp:'°C', umid:'%', pres:' hPa', chuva:' mm' }[v];
}

// ════════════════════════════════════════════════
//  VENTO — APENAS PARTÍCULAS (com/sem rastro)
//  Bug fix: clipping path mantém fade restrito à fazenda
// ════════════════════════════════════════════════
const ventoLayer = L.layerGroup();
let particulas = [];
let animFrameId = null;
let ventoCanvasEl = null;
let ventoCtx = null;
let clipPathCache = null; // path2D dos lotes em coords de canvas

function renderizarVento() {
  ventoLayer.clearLayers();
  pararAnimacao();

  if (!camadas.vento) {
    if (ventoCanvasEl) ventoCanvasEl.style.display = 'none';
    return;
  }

  // Sempre partículas, com diferença apenas no rastro
  inicializarParticulas();
  iniciarAnimacao(ventoStyle);
}

function ventoInterpolado(lat, lon) {
  let uSum=0, vSum=0, wSum=0;
  for (const e of estacoes) {
    const d2 = (lat-e.lat)**2 + (lon-e.lon)**2;
    if (d2 < 1e-10) continue;
    const w = 1 / d2;
    const rad = (e.ventoDir - 90) * Math.PI / 180;
    uSum += w * Math.cos(rad) * e.ventoVel;
    vSum += w * Math.sin(rad) * e.ventoVel;
    wSum += w;
  }
  if (wSum < 1e-10) return null;
  return { u: uSum/wSum, v: vSum/wSum };
}

function corVento(vel) {
  if (vel < 5) return '#94a3b8';
  if (vel < 10) return '#34d399';
  if (vel < 15) return '#fbbf24';
  return '#ef4444';
}

// ════════════════════════════════════════════════
//  CANVAS DE VENTO — implementação com clipping
// ════════════════════════════════════════════════
function configurarCanvas() {
  ventoCanvasEl = document.getElementById('vento-canvas');
  const mapArea = document.querySelector('.map-area');
  const rect = mapArea.getBoundingClientRect();

  const dpr = window.devicePixelRatio || 1;
  ventoCanvasEl.width = rect.width * dpr;
  ventoCanvasEl.height = rect.height * dpr;

  ventoCanvasEl.style.width = rect.width + 'px';
  ventoCanvasEl.style.height = rect.height + 'px';
  ventoCanvasEl.style.display = 'block';

  ventoCtx = ventoCanvasEl.getContext('2d');
  ventoCtx.scale(dpr, dpr);

  // Limpa explicitamente o canvas
  ventoCtx.clearRect(0, 0, rect.width, rect.height);

  // Pré-calcula o path de clipping (todos os lotes)
  construirClipPath();

  return { width: rect.width, height: rect.height };
}

function construirClipPath() {
  clipPathCache = new Path2D();
  for (const lote of LOTES) {
    if (lote.coords.length < 3) continue;
    let primeiro = true;
    for (const c of lote.coords) {
      const pt = map.latLngToContainerPoint([c[0], c[1]]);
      if (primeiro) {
        clipPathCache.moveTo(pt.x, pt.y);
        primeiro = false;
      } else {
        clipPathCache.lineTo(pt.x, pt.y);
      }
    }
    clipPathCache.closePath();
  }
}

function inicializarParticulas() {
  particulas = [];
  const N = 400;
  const bb = fazendaBBox;
  for (let i = 0; i < N; i++) {
    particulas.push(criarParticula(bb));
  }
}

function criarParticula(bb) {
  let lat, lon, tentativas = 0;
  do {
    lat = bb.minLat + Math.random() * (bb.maxLat - bb.minLat);
    lon = bb.minLon + Math.random() * (bb.maxLon - bb.minLon);
    tentativas++;
  } while (!pontoNaFazenda(lat, lon) && tentativas < 20);
  return {
    lat, lon, prevLat: lat, prevLon: lon,
    age: Math.floor(Math.random()*80),
    maxAge: 80 + Math.floor(Math.random()*80)
  };
}

function iniciarAnimacao(modo) {
  const dims = configurarCanvas();
  let lastT = performance.now();

  // Garante canvas inicial 100% transparente
  ventoCtx.clearRect(0, 0, dims.width, dims.height);

  function loop(t) {
    // CAP RÍGIDO: evita saltos quando navegador trava ou perde foco
    const dt = Math.min(t - lastT, 33);
    lastT = t;

    if (!ventoCtx) { animFrameId = null; return; }

    if (modo === 'part-rastro') {
      // FIX DO FUNDO PRETO SOBRE HEATMAP:
      // Em vez de pintar preto semi-transparente (que se acumulava sobre o heatmap),
      // usamos destination-out para APAGAR o canvas gradualmente.
      // Isso mantém o efeito de rastro sem manchar o que está atrás.
      ventoCtx.save();
      ventoCtx.clip(clipPathCache);
      ventoCtx.globalCompositeOperation = 'destination-out';
      ventoCtx.fillStyle = 'rgba(0, 0, 0, 0.08)';
      ventoCtx.fillRect(0, 0, dims.width, dims.height);
      ventoCtx.globalCompositeOperation = 'source-over';
      ventoCtx.restore();
      desenharParticulasRastro(dt);
    } else {
      // Modo sem rastro: limpa tudo a cada frame e desenha
      ventoCtx.clearRect(0, 0, dims.width, dims.height);
      desenharParticulasPuras(dt);
    }

    animFrameId = requestAnimationFrame(loop);
  }

  animFrameId = requestAnimationFrame(loop);
}

function pararAnimacao() {
  if (animFrameId) {
    cancelAnimationFrame(animFrameId);
    animFrameId = null;
  }
  if (ventoCtx && ventoCanvasEl) {
    ventoCtx.clearRect(0, 0, ventoCanvasEl.width, ventoCanvasEl.height);
  }
}

// VELOCIDADE: reduzida pela metade conforme pedido (0.000004 → 0.000002)
const VELOCIDADE_PARTICULA = 0.000002;

function desenharParticulasRastro(dt) {
  const bb = fazendaBBox;
  const stepFactor = VELOCIDADE_PARTICULA * Math.min(dt, 50);

  ventoCtx.save();
  ventoCtx.clip(clipPathCache); // partículas também só desenham dentro

  for (const p of particulas) {
    const vec = ventoInterpolado(p.lat, p.lon);
    if (!vec) {
      Object.assign(p, criarParticula(bb));
      continue;
    }

    p.prevLat = p.lat;
    p.prevLon = p.lon;
    p.lon += vec.u * stepFactor;
    p.lat += vec.v * stepFactor;
    p.age++;

    if (p.age > p.maxAge || !pontoNaFazenda(p.lat, p.lon)) {
      Object.assign(p, criarParticula(bb));
      continue;
    }

    const pt = map.latLngToContainerPoint([p.lat, p.lon]);
    const ptPrev = map.latLngToContainerPoint([p.prevLat, p.prevLon]);
    const mag = Math.sqrt(vec.u*vec.u + vec.v*vec.v);

    ventoCtx.strokeStyle = corVento(mag);
    ventoCtx.lineWidth = 1.4;
    ventoCtx.globalAlpha = 0.9;
    ventoCtx.beginPath();
    ventoCtx.moveTo(ptPrev.x, ptPrev.y);
    ventoCtx.lineTo(pt.x, pt.y);
    ventoCtx.stroke();
  }
  ventoCtx.globalAlpha = 1;
  ventoCtx.restore();
}

function desenharParticulasPuras(dt) {
  const bb = fazendaBBox;
  const stepFactor = VELOCIDADE_PARTICULA * Math.min(dt, 50);

  ventoCtx.save();
  ventoCtx.clip(clipPathCache);

  for (const p of particulas) {
    const vec = ventoInterpolado(p.lat, p.lon);
    if (!vec) {
      Object.assign(p, criarParticula(bb));
      continue;
    }

    p.lon += vec.u * stepFactor;
    p.lat += vec.v * stepFactor;
    p.age++;

    if (p.age > p.maxAge || !pontoNaFazenda(p.lat, p.lon)) {
      Object.assign(p, criarParticula(bb));
      continue;
    }

    const pt = map.latLngToContainerPoint([p.lat, p.lon]);
    const mag = Math.sqrt(vec.u*vec.u + vec.v*vec.v);

    // Ponto sólido brilhante (sem rastro)
    ventoCtx.fillStyle = corVento(mag);
    ventoCtx.globalAlpha = 0.95;
    ventoCtx.beginPath();
    ventoCtx.arc(pt.x, pt.y, 2, 0, Math.PI*2);
    ventoCtx.fill();
  }
  ventoCtx.globalAlpha = 1;
  ventoCtx.restore();
}

// Quando o mapa muda, refaz tudo
map.on('moveend zoomend', () => {
  if (camadas.vento) {
    pararAnimacao();
    setTimeout(() => {
      inicializarParticulas();
      iniciarAnimacao(ventoStyle);
    }, 80);
  }

function setPanelTab(tab) {
  panelTab = tab;
  document.querySelectorAll('.panel-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  renderPanel();
}

function renderPanel() {
  const c = document.getElementById('panel-content');
  if (panelTab === 'overview') {
    c.innerHTML = renderOverview();
    if (estacaoSel) setTimeout(renderMiniChart, 50);
  } else if (panelTab === 'stations') {
    c.innerHTML = renderStations();
    bindStationItems();
  } else if (panelTab === 'lotes') {
    c.innerHTML = renderLotes();
  } else {
    c.innerHTML = renderAnalise();
  }
}

function renderOverview() {
  const ativas = estacoes.filter(e => e.online);
  const avg = key => ativas.reduce((s,e) => s+e[key], 0) / ativas.length;
  const chuvaKey = periodo === 'live' || periodo === '24h' ? 'chuva24h' : periodo === '7d' ? 'chuva7d' : periodo === '30d' ? 'chuva30d' : 'chuvaSafra';
  const chuvaAvg = avg(chuvaKey);

  let detalhe = '';
  if (estacaoSel) {
    const e = estacoes.find(s => s.id === estacaoSel);
    if (e) {
      detalhe = `<div class="panel-section">
        <div class="panel-section-title">${e.nome} — detalhes</div>
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-label">Temp</div><div class="stat-value">${e.temp}<span class="unit">°C</span></div></div>
          <div class="stat-card"><div class="stat-label">Umidade</div><div class="stat-value">${e.umid}<span class="unit">%</span></div></div>
          <div class="stat-card"><div class="stat-label">Vento</div><div class="stat-value">${e.ventoVel}<span class="unit">km/h ${dirNome(e.ventoDir)}</span></div></div>
          <div class="stat-card"><div class="stat-label">Solo</div><div class="stat-value">${e.solo}<span class="unit">%</span></div></div>
          <div class="stat-card wide"><div class="stat-label">Chuva ${periodo}</div><div class="stat-value">${chuvaPorPeriodo(e)}<span class="unit">mm</span></div></div>
          <div class="stat-card wide">
            <div class="stat-label">Histórico — temperatura</div>
            <div class="mini-chart" id="mini-chart"></div>
          </div>
        </div>
      </div>`;
    }
  }

  return `<div class="panel-section">
      <div class="panel-section-title">Fazenda — ${ativas.length} estações</div>
      <div class="stat-grid">
        <div class="stat-card wide">
          <div class="stat-label">Período exibido</div>
          <div style="font-size:14px;font-weight:600;margin-top:2px">Média ${labelPeriodo(periodo)}</div>
        </div>
        <div class="stat-card"><div class="stat-label">Temp média</div><div class="stat-value">${avg('temp').toFixed(1)}<span class="unit">°C</span></div></div>
        <div class="stat-card"><div class="stat-label">Umidade</div><div class="stat-value">${avg('umid').toFixed(0)}<span class="unit">%</span></div></div>
        <div class="stat-card"><div class="stat-label">Pressão</div><div class="stat-value">${avg('pres').toFixed(0)}<span class="unit">hPa</span></div></div>
        <div class="stat-card"><div class="stat-label">Vento</div><div class="stat-value">${avg('ventoVel').toFixed(1)}<span class="unit">km/h</span></div></div>
        <div class="stat-card wide">
          <div class="stat-label">💧 Chuva acumulada ${periodo}</div>
          <div class="stat-value">${chuvaAvg.toFixed(1)}<span class="unit">mm (média)</span></div>

function selecionarEstacao(id) {
  estacaoSel = id;
  setPanelTab('overview');

function renderMiniChart() {
  const el = document.getElementById('mini-chart');
  if (!el || !estacaoSel) return;
  const e = estacoes.find(s => s.id === estacaoSel);
  if (!e) return;
  const N = 48;
  const data = [];
  for (let i = 0; i < N; i++) {
    const t = simPhase - (N-i)*0.1;
    data.push(26 + Math.sin(t*0.4 + e.id*0.3)*3 + Math.sin(t*1.2)*0.8);
  }
  const w = el.clientWidth || 200, h = el.clientHeight || 80;
  const min = Math.min(...data) - 1;
  const max = Math.max(...data) + 1;
  const pts = data.map((v,i) => {
    const x = (i/(N-1))*w;
    const y = h - ((v-min)/(max-min))*(h-10) - 5;
    return `${x.toFixed(1)} ${y.toFixed(1)}`;
  });
  const linePath = 'M ' + pts.join(' L ');
  const areaPath = linePath + ` L ${w} ${h} L 0 ${h} Z`;
  el.innerHTML = `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="chart-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${areaPath}" class="chart-area"/>
    <path d="${linePath}" class="chart-line"/>
  </svg>`;
}

function openPanel() {
  if (window.innerWidth <= 900) {
    document.getElementById('panel').classList.add('open');
  }
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

const handle = document.getElementById('panel-handle');
let dragStartY = 0;
let isDragging = false;

function handleStart(y) {
  isDragging = true;
  dragStartY = y;
  const panel = document.getElementById('panel');
  panel.style.transition = 'none';
}

function handleMove(y) {
  if (!isDragging) return;
  const dy = y - dragStartY;
  const panel = document.getElementById('panel');
  if (panel.classList.contains('open') && dy > 0) {
    panel.style.transform = `translateY(${dy}px)`;
  } else if (!panel.classList.contains('open') && dy < 0) {
    panel.style.transform = `translateY(calc(100% - 60px + ${dy}px))`;
  }
}

function handleEnd(y) {
  if (!isDragging) return;
  isDragging = false;
  const panel = document.getElementById('panel');
  panel.style.transition = '';
  panel.style.transform = '';
  const dy = y - dragStartY;
  if (panel.classList.contains('open')) { if (dy > 80) closePanel(); }
  else { if (dy < -50) openPanel(); }
}

handle.addEventListener('touchstart', (e) => { handleStart(e.touches[0].clientY); e.stopPropagation(); }, { passive: true });
handle.addEventListener('touchmove', (e) => { handleMove(e.touches[0].clientY); e.preventDefault(); }, { passive: false });
handle.addEventListener('touchend', (e) => { handleEnd(e.changedTouches[0].clientY); }, { passive: true });
handle.addEventListener('mousedown', (e) => { handleStart(e.clientY); });
document.addEventListener('mousemove', (e) => { if (isDragging) handleMove(e.clientY); });
document.addEventListener('mouseup', (e) => { if (isDragging) handleEnd(e.clientY); });

  estacoes = gerarDados();

  // vento é animado continuamente pelo requestAnimationFrame, não precisa atualizar aqui
  renderPanel();
  updateTime();
  document.getElementById('hdr-stats').textContent =
    `${estacoes.filter(e=>e.online).length} ativas · 5.261 ha`;
}

    { key: 'hybrid', icon: '🗺️', label: 'Híbrido' },
    { key: 'terrain', icon: '⛰️', label: 'Topográfico' },
    { key: 'streets', icon: '🛣️', label: 'Ruas' }
  ];
  let tipoAtivo = 'satellite';
  lista.innerHTML = tipos.map(t => `
    <button class="sheet-item ${tipoAtivo === t.key ? 'active' : ''}" data-tile="${t.key}">
      <span class="item-icon">${t.icon}</span>
      <span class="item-label">${t.label}</span>
    </button>
  `).join('');
  lista.querySelectorAll('button').forEach(btn => {
    bindTouch(btn, () => {
      const k = btn.dataset.tile;
      if (tileAtual) map.removeLayer(tileAtual);
      tileAtual = tileLayers[k].addTo(map);
      lista.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.tile === k));
      // Sincroniza com botões desktop
      document.querySelectorAll('.map-type button').forEach(b => b.classList.toggle('active', b.dataset.tile === k));
      vibrar(10);
    });
  });
}

// ----- Função genérica para reaplicar todas camadas -----
function atualizarTodasCamadas() {
  // Lotes
  if (camadas.lotes) {
    if (typeof renderizarLotes === 'function') renderizarLotes();
    aplicarNomesLotes();
  } else {
    if (typeof limparLotes === 'function') limparLotes();
    removerNomesLotes();
  }
  // Estações
  if (typeof toggleEstacoes === 'function') toggleEstacoes(camadas.estacoes);
  // Heatmap
  renderizarHeatmap();
  // Vento
  if (camadas.vento) {
    if (typeof iniciarVento === 'function') iniciarVento();
  } else {
    if (typeof pararVento === 'function') pararVento();
  }
  atualizarSubControles();
  // Sincroniza com botões desktop
  document.querySelectorAll('.layer-btn').forEach(b => {
    if (b.dataset.layer) b.classList.toggle('active', !!camadas[b.dataset.layer]);
  });
}

// ----- Nomes dos lotes (aparecem com camada Lotes em zoom alto) -----
let nomesLotesLayer = null;
function aplicarNomesLotes() {
  removerNomesLotes();
  if (!camadas.lotes) return;
  if (map.getZoom() < 13) return;
  if (typeof LOTES === 'undefined' || !LOTES) return;

  nomesLotesLayer = L.layerGroup();
  LOTES.forEach(lote => {
    if (!lote.coords || !lote.coords.length) return;
    // calcula centróide simples
    let sumLat = 0, sumLng = 0, n = 0;
    lote.coords.forEach(c => { sumLat += c[0]; sumLng += c[1]; n++; });
    if (n === 0) return;
    const center = [sumLat / n, sumLng / n];
    const label = L.marker(center, {
      icon: L.divIcon({
        className: 'lote-name-label',
        html: lote.nome || '',
        iconSize: null
      }),
      interactive: false
    });
    nomesLotesLayer.addLayer(label);
  });
  nomesLotesLayer.addTo(map);
}

function removerNomesLotes() {
  if (nomesLotesLayer) {
    map.removeLayer(nomesLotesLayer);
    nomesLotesLayer = null;
  }
}

map.on('zoomend', aplicarNomesLotes);

// ----- Modo tela cheia -----
let fullscreen = false;
function toggleFullscreen() {
  fullscreen = !fullscreen;
  document.body.classList.toggle('fullscreen', fullscreen);
  // Atualiza check no menu config
  const cfg = document.getElementById('cfg-fullscreen');
  if (cfg) cfg.querySelector('.item-check').classList.toggle('active', fullscreen);
  // Redimensiona o mapa
  setTimeout(() => map.invalidateSize(), 350);
  vibrar(15);
}
bindTouch(document.getElementById('btn-exit-fullscreen'), () => {
  toggleFullscreen();
  fecharSheet();
});
bindTouch(document.getElementById('cfg-fullscreen'), () => {
  toggleFullscreen();
  fecharSheet();
});

// ----- Tema escuro automático toggle -----
bindTouch(document.getElementById('cfg-darkauto'), () => {
  darkAuto = !darkAuto;
  document.getElementById('cfg-darkauto').querySelector('.item-check').classList.toggle('active', darkAuto);
  aplicarTemaAuto();
  vibrar(10);
});

// ----- Vibração toggle -----
bindTouch(document.getElementById('cfg-vibrate'), () => {
  vibrateOn = !vibrateOn;
  document.getElementById('cfg-vibrate').querySelector('.item-check').classList.toggle('active', vibrateOn);
  if (vibrateOn) navigator.vibrate && navigator.vibrate([10, 50, 10]);
});

// ----- Compass / norte -----
let compassOn = true;
bindTouch(document.getElementById('cfg-compass'), () => {
  compassOn = !compassOn;
  document.getElementById('cfg-compass').querySelector('.item-check').classList.toggle('active', compassOn);
  vibrar(10);
});

// ----- GPS / minha localização -----
bindTouch(document.getElementById('fab-gps'), () => {
  if (!navigator.geolocation) {
    alert('GPS não disponível neste dispositivo.');
    return;
  }
  vibrar(15);
  const fab = document.getElementById('fab-gps');
  fab.classList.add('active');
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;
      map.setView([latitude, longitude], 15, { animate: true });
      L.circleMarker([latitude, longitude], {
        radius: 10, color: '#3b82f6', weight: 3, fillColor: '#3b82f6', fillOpacity: .3
      }).addTo(map).bindPopup('📍 Sua localização').openPopup();
      setTimeout(() => fab.classList.remove('active'), 1000);
    },
    (err) => {
      fab.classList.remove('active');
      alert('Não foi possível obter localização: ' + err.message);
    },
    { enableHighAccuracy: true, timeout: 8000 }
  );
});

// ----- Atualiza nome de lotes ao toggle camadas (e ao inicializar) -----
// hook para sincronizar quando trocar camada via desktop
const origAtualizarTodas = window.atualizarTodasCamadas;
// Popular sheets na inicialização
popularSheetCamadas();
popularSheetVariavel();
popularSheetMapa();
atualizarFabsAtivos();
aplicarNomesLotes();

// Re-popular variável sheet quando heatmap muda (mostra/oculta sub-sessão)
const origAtualizarSubControles = window.atualizarSubControles || atualizarSubControles;
window.atualizarSubControles = function() {
  origAtualizarSubControles.apply(this, arguments);
  popularSheetVariavel();
  atualizarFabsAtivos();
};
</script>
